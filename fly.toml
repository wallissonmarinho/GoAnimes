# Fly.io — https://fly.io/docs/reference/configuration/
# 1. Ajuste `app` ao nome da app (`fly apps create <nome>`).
# 2. Volume SQLite: fly volumes create goanimes_data --region gru --size 1
# 3. Com Postgres (DATABASE_URL), remova [mounts] e defina DATABASE_URL nos secrets.

app = "goanimes"
primary_region = "gru"

[build]

[env]
  GIN_MODE = "release"
  # AniList posters: no secret/API key. Only set to disable:
  # GOANIMES_ANILIST_DISABLED = "true"
  # Long syncs (many series): if posters never fill, try min_machines_running = 1 so the machine
  # does not stop before POST /api/v1/rebuild background work finishes (see [http_service]).

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[mounts]
  source = "goanimes_data"
  destination = "/app/data"

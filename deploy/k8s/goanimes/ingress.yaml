# Traefik (k3s) — expõe o Service `goanimes` no hostname público.
# Requisitos fora do cluster:
#   1) DuckDNS: A record = IP público de um nó onde a Security List da OCI aceita **443** (e **80** se usares HTTP-01 / redirect).
#   2) Esse IP não tem de ser o Ampere — é o IP do nó onde o tráfego da Internet chega ao Traefik (svclb-traefik nos nós).
# HTTPS: Traefik usa `web` (80) e `websecure` (443). Sem `router.tls` + `websecure`, o Ingress pode ficar só
# em **80** (`kubectl get ingress` → PORTS 80) e **443** aceita TLS por defeito mas **sem** router → timeout.
# Para certificado de confiança: ACME no HelmChartConfig do Traefik, cert-manager, ou `spec.tls` + Secret.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goanimes
  namespace: goanimes
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  # `tls.hosts` sem Secret faz o Traefik usar o cert por defeito e regista o router em **websecure** (443).
  tls:
    - hosts:
        - goanimes.duckdns.org
      secretName: goanimes-tls
  rules:
    - host: goanimes.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: goanimes
                port:
                  number: 8080

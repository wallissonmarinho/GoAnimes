apiVersion: apps/v1
kind: Deployment
metadata:
  name: goanimes
  labels:
    app.kubernetes.io/name: goanimes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: goanimes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goanimes
    spec:
      containers:
        - name: goanimes
          # Substituído no CI antes do tar (oracle-deploy.yml — passo "Stamp container image").
          image: __GOANIMES_CONTAINER_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: goanimes-env
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: data
          emptyDir: {}

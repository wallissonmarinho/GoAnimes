apiVersion: apps/v1
kind: Deployment
metadata:
  name: goanimes
  labels:
    app.kubernetes.io/name: goanimes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: goanimes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goanimes
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      hostAliases:
        - ip: __POSTGRES_SVC_CLUSTER_IP__
          hostnames:
            - postgres.postgres.svc.cluster.local
      containers:
        - name: goanimes
          # Substituído no CI antes do tar (oracle-deploy.yml — passo "Stamp container image").
          image: __GOANIMES_CONTAINER_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: goanimes-env
          volumeMounts:
            - name: data
              mountPath: /app/data
          # Arranque: OpenCatalog (Postgres) + Hydrate podem atrasar ListenAndServe vs probes.
          startupProbe:
            httpGet:
              path: /health
              port: http
            # OpenCatalog (Postgres remoto / migrations) pode exceder 3m antes de ListenAndServe.
            failureThreshold: 72
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: data
          emptyDir: {}

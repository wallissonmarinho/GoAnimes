# Deploy na VM Oracle (**k3s**): push em main/master — build/push GHCR + SSH aplica **Pod** (Deployment)
# no cluster k3s (`namespace/goanimes`), Secret `goanimes-env` a partir de `deploy/oracle/.env.goanimes.deploy`, e
# `kubectl rollout status`. **OCI_VM_HOST** = máquina onde o **k3s** expõe `kubectl` (ex.: Ampere como server).
#
# Postgres no cluster (repo **www**): `deploy/k8s/postgres/` — base `goanimes`. No GitHub ambiente **prd**
# **Variable** `DATABASE_URL` (in-cluster), ex.:
#   postgresql://postgres:SENHA@postgres.postgres.svc.cluster.local:5432/goanimes?sslmode=disable
# **SENHA** = mesma que `POSTGRES_PASSWORD` em `postgres-secret` (ver `deploy/k8s/postgres/apply.sh`).
#
# Job deploy: environment **prd** — **Variables** (`vars.*`) → ficheiro `.env` na VM + Secret no k3s `goanimes-env`.
#   Chaves API, `DATABASE_URL`, `GOANIMES_ENV_B64`, etc. ficam **visíveis na UI** GitHub a quem gere o ambiente
#   **prd** (útil para não esquecer valores); evita Secrets de ambiente para essa config. **Repository secrets**
#   mantêm-se só para SSH (e `GITHUB_TOKEN` no build).
#
# Repository secrets: OCI_VM_HOST, OCI_VM_USER, OCI_SSH_PRIVATE_KEY; opcional OCI_DEPLOY_ROOT (legado —
#   preferir Variable `OCI_DEPLOY_ROOT`)
#
# Environment **prd** ou repo **Variables** (`vars.` — ver README):
#   GOANIMES_ADMIN_API_KEY, ADMIN_API_KEY, DATABASE_URL, GOANIMES_SQLITE_DSN,
#   GOANIMES_TMDB_API_KEY, GOANIMES_TVDB_API_KEY, GOANIMES_TVDB_PIN, GOANIMES_GOAI_ADMIN_API_KEY,
#   GOANIMES_ENV_B64, OCI_DEPLOY_ROOT,
#   GOANIMES_SYNC_INTERVAL, GOANIMES_SYNC_RUN_TIMEOUT, GOANIMES_RSS_POLL_INTERVAL, GOANIMES_HTTP_TIMEOUT,
#   GOANIMES_ERAI_MAX_PER_ANIME_FEEDS, GOANIMES_ERAI_PER_ANIME_DELAY, GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS,
#   GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF, GOANIMES_CINEMETA_BASE_URL, GOANIMES_CINEMETA_MIN_DELAY, GOANIMES_CINEMETA_DISABLED,
#   GOANIMES_ANILIST_DISABLED, GOANIMES_JIKAN_DISABLED, GOANIMES_KITSU_DISABLED, GOANIMES_TMDB_DISABLED, GOANIMES_TVDB_DISABLED,
#   GOANIMES_ANILIST_MIN_DELAY, GOANIMES_JIKAN_MIN_DELAY, GOANIMES_KITSU_MIN_DELAY, GOANIMES_TMDB_MIN_DELAY, GOANIMES_TVDB_MIN_DELAY,
#   GOANIMES_ANIDB_CLIENT, GOANIMES_ANIDB_CLIENTVER, GOANIMES_ANIDB_MIN_DELAY, GOANIMES_ANIDB_DISABLED,
#   GOANIMES_MAX_BODY_BYTES, GOANIMES_USER_AGENT, GOANIMES_SYNC_STATUS_TZ, PORT, GOANIMES_ADDR, GOANIMES_DATA_DIR, GIN_MODE,
#   GOANIMES_GOAI_AUDIT_ENABLED, GOANIMES_GOAI_AUDIT_INTERVAL, GOANIMES_GOAI_HTTP_TIMEOUT, GOANIMES_GOAI_BASE_URL,
#   OTEL_SERVICE_NAME, OTEL_SDK_DISABLED, OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
#
# ACME / Caddy continuam no .env na VM (não são enviados por este workflow).
name: oracle-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-goanimes-${{ github.ref }}
  cancel-in-progress: true

env:
  GOANIMES_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check layout (no RSS sync dupes in services/)
        run: bash scripts/check-layout.sh

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11

      - name: Test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goanimes:${{ env.GOANIMES_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goanimes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Stamp container image in k3s manifest (Deployment)
        run: |
          set -euo pipefail
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${OWNER}/goanimes:${{ github.sha }}"
          sed -i "s|__GOANIMES_CONTAINER_IMAGE__|${IMG}|g" deploy/k8s/goanimes/deployment.yaml

      # Tar no workspace (caminho relativo): appleboy/scp-action usa paths relativos a $GITHUB_WORKSPACE;
      # `source: /tmp/...` resulta em "tar: empty archive" no runner.
      - name: Pack k8s manifests
        run: |
          set -euo pipefail
          test -d deploy/k8s/goanimes
          tar czf goanimes-k8s.tgz -C deploy/k8s goanimes
          ls -la goanimes-k8s.tgz

      - name: Copy k8s bundle to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          source: goanimes-k8s.tgz
          target: /tmp/

      - name: Deploy GoAnimes on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          OCI_DEPLOY_ROOT: ${{ vars.OCI_DEPLOY_ROOT || secrets.OCI_DEPLOY_ROOT }}
          GOANIMES_GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GOANIMES_IMAGE_TAG: main
          GOANIMES_ADMIN_API_KEY: ${{ vars.GOANIMES_ADMIN_API_KEY }}
          ADMIN_API_KEY: ${{ vars.ADMIN_API_KEY }}
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          GOANIMES_SQLITE_DSN: ${{ vars.GOANIMES_SQLITE_DSN }}
          GOANIMES_TMDB_API_KEY: ${{ vars.GOANIMES_TMDB_API_KEY }}
          GOANIMES_TVDB_API_KEY: ${{ vars.GOANIMES_TVDB_API_KEY }}
          GOANIMES_TVDB_PIN: ${{ vars.GOANIMES_TVDB_PIN }}
          GOANIMES_ENV_B64: ${{ vars.GOANIMES_ENV_B64 }}
          GOANIMES_GOAI_ADMIN_API_KEY: ${{ vars.GOANIMES_GOAI_ADMIN_API_KEY }}
          GOANIMES_GOAI_AUDIT_ENABLED: ${{ vars.GOANIMES_GOAI_AUDIT_ENABLED }}
          GOANIMES_GOAI_AUDIT_INTERVAL: ${{ vars.GOANIMES_GOAI_AUDIT_INTERVAL }}
          GOANIMES_GOAI_HTTP_TIMEOUT: ${{ vars.GOANIMES_GOAI_HTTP_TIMEOUT }}
          GOANIMES_GOAI_BASE_URL: ${{ vars.GOANIMES_GOAI_BASE_URL }}
          GOANIMES_SYNC_INTERVAL: ${{ vars.GOANIMES_SYNC_INTERVAL }}
          GOANIMES_SYNC_RUN_TIMEOUT: ${{ vars.GOANIMES_SYNC_RUN_TIMEOUT }}
          GOANIMES_RSS_POLL_INTERVAL: ${{ vars.GOANIMES_RSS_POLL_INTERVAL }}
          GOANIMES_HTTP_TIMEOUT: ${{ vars.GOANIMES_HTTP_TIMEOUT }}
          GOANIMES_CINEMETA_BASE_URL: ${{ vars.GOANIMES_CINEMETA_BASE_URL }}
          GOANIMES_CINEMETA_MIN_DELAY: ${{ vars.GOANIMES_CINEMETA_MIN_DELAY }}
          GOANIMES_CINEMETA_DISABLED: ${{ vars.GOANIMES_CINEMETA_DISABLED }}
          GOANIMES_ERAI_MAX_PER_ANIME_FEEDS: ${{ vars.GOANIMES_ERAI_MAX_PER_ANIME_FEEDS }}
          GOANIMES_ERAI_PER_ANIME_DELAY: ${{ vars.GOANIMES_ERAI_PER_ANIME_DELAY }}
          GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS: ${{ vars.GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS }}
          GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF: ${{ vars.GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF }}
          GOANIMES_ANILIST_DISABLED: ${{ vars.GOANIMES_ANILIST_DISABLED }}
          GOANIMES_JIKAN_DISABLED: ${{ vars.GOANIMES_JIKAN_DISABLED }}
          GOANIMES_KITSU_DISABLED: ${{ vars.GOANIMES_KITSU_DISABLED }}
          GOANIMES_TMDB_DISABLED: ${{ vars.GOANIMES_TMDB_DISABLED }}
          GOANIMES_TVDB_DISABLED: ${{ vars.GOANIMES_TVDB_DISABLED }}
          GOANIMES_ANILIST_MIN_DELAY: ${{ vars.GOANIMES_ANILIST_MIN_DELAY }}
          GOANIMES_JIKAN_MIN_DELAY: ${{ vars.GOANIMES_JIKAN_MIN_DELAY }}
          GOANIMES_KITSU_MIN_DELAY: ${{ vars.GOANIMES_KITSU_MIN_DELAY }}
          GOANIMES_TMDB_MIN_DELAY: ${{ vars.GOANIMES_TMDB_MIN_DELAY }}
          GOANIMES_TVDB_MIN_DELAY: ${{ vars.GOANIMES_TVDB_MIN_DELAY }}
          GOANIMES_ANIDB_CLIENT: ${{ vars.GOANIMES_ANIDB_CLIENT }}
          GOANIMES_ANIDB_CLIENTVER: ${{ vars.GOANIMES_ANIDB_CLIENTVER }}
          GOANIMES_ANIDB_MIN_DELAY: ${{ vars.GOANIMES_ANIDB_MIN_DELAY }}
          GOANIMES_ANIDB_DISABLED: ${{ vars.GOANIMES_ANIDB_DISABLED }}
          GOANIMES_MAX_BODY_BYTES: ${{ vars.GOANIMES_MAX_BODY_BYTES }}
          GOANIMES_USER_AGENT: ${{ vars.GOANIMES_USER_AGENT }}
          GOANIMES_SYNC_STATUS_TZ: ${{ vars.GOANIMES_SYNC_STATUS_TZ }}
          PORT: ${{ vars.PORT }}
          GOANIMES_ADDR: ${{ vars.GOANIMES_ADDR }}
          GOANIMES_DATA_DIR: ${{ vars.GOANIMES_DATA_DIR }}
          GIN_MODE: ${{ vars.GIN_MODE }}
          OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
          OTEL_SDK_DISABLED: ${{ vars.OTEL_SDK_DISABLED }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: OCI_DEPLOY_ROOT,GOANIMES_GHCR_OWNER,GOANIMES_IMAGE_TAG,GOANIMES_ADMIN_API_KEY,ADMIN_API_KEY,DATABASE_URL,GOANIMES_SQLITE_DSN,GOANIMES_TMDB_API_KEY,GOANIMES_TVDB_API_KEY,GOANIMES_TVDB_PIN,GOANIMES_ENV_B64,GOANIMES_GOAI_ADMIN_API_KEY,GOANIMES_GOAI_AUDIT_ENABLED,GOANIMES_GOAI_AUDIT_INTERVAL,GOANIMES_GOAI_HTTP_TIMEOUT,GOANIMES_GOAI_BASE_URL,GOANIMES_SYNC_INTERVAL,GOANIMES_SYNC_RUN_TIMEOUT,GOANIMES_RSS_POLL_INTERVAL,GOANIMES_HTTP_TIMEOUT,GOANIMES_CINEMETA_BASE_URL,GOANIMES_CINEMETA_MIN_DELAY,GOANIMES_CINEMETA_DISABLED,GOANIMES_ERAI_MAX_PER_ANIME_FEEDS,GOANIMES_ERAI_PER_ANIME_DELAY,GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS,GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF,GOANIMES_ANILIST_DISABLED,GOANIMES_JIKAN_DISABLED,GOANIMES_KITSU_DISABLED,GOANIMES_TMDB_DISABLED,GOANIMES_TVDB_DISABLED,GOANIMES_ANILIST_MIN_DELAY,GOANIMES_JIKAN_MIN_DELAY,GOANIMES_KITSU_MIN_DELAY,GOANIMES_TMDB_MIN_DELAY,GOANIMES_TVDB_MIN_DELAY,GOANIMES_ANIDB_CLIENT,GOANIMES_ANIDB_CLIENTVER,GOANIMES_ANIDB_MIN_DELAY,GOANIMES_ANIDB_DISABLED,GOANIMES_MAX_BODY_BYTES,GOANIMES_USER_AGENT,GOANIMES_SYNC_STATUS_TZ,PORT,GOANIMES_ADDR,GOANIMES_DATA_DIR,GIN_MODE,OTEL_SERVICE_NAME,OTEL_SDK_DISABLED,OTEL_EXPORTER_OTLP_ENDPOINT,OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            export GOANIMES_GHCR_OWNER="${GOANIMES_GHCR_OWNER}"
            export GOANIMES_IMAGE_TAG="${GOANIMES_IMAGE_TAG:-main}"
            ORACLE_DIR="${ROOT}/deploy/oracle"
            DEPLOY_ENV="${ORACLE_DIR}/.env.goanimes.deploy"
            mkdir -p "${ORACLE_DIR}"
            K8S_TAR="${GOANIMES_K8S_TARBALL:-/tmp/goanimes-k8s.tgz}"
            if [ ! -f "${K8S_TAR}" ]; then
              echo "Falta ${K8S_TAR} (passo SCP do workflow). Sem tarball não há manifests para kubectl." >&2
              exit 1
            fi
            mkdir -p "${ROOT}/deploy/k8s"
            tar xzf "${K8S_TAR}" -C "${ROOT}/deploy/k8s"
            rm -f "${K8S_TAR}"
            K8S_DIR="${ROOT}/deploy/k8s/goanimes"
            command -v kubectl >/dev/null 2>&1 || { echo "kubectl não está no PATH nesta VM (precisas do kubeconfig do k3s)." >&2; exit 1; }
            umask 077
            : > "${DEPLOY_ENV}"
            write_kv() {
              _k="$1"
              _v="$2"
              [ -n "${_v}" ] || return 0
              printf '%s=%s\n' "${_k}" "${_v}" >> "${DEPLOY_ENV}"
            }
            write_kv GOANIMES_ADMIN_API_KEY "${GOANIMES_ADMIN_API_KEY:-}"
            write_kv ADMIN_API_KEY "${ADMIN_API_KEY:-}"
            write_kv DATABASE_URL "${DATABASE_URL:-}"
            write_kv GOANIMES_SQLITE_DSN "${GOANIMES_SQLITE_DSN:-}"
            write_kv GOANIMES_TMDB_API_KEY "${GOANIMES_TMDB_API_KEY:-}"
            write_kv GOANIMES_TVDB_API_KEY "${GOANIMES_TVDB_API_KEY:-}"
            write_kv GOANIMES_TVDB_PIN "${GOANIMES_TVDB_PIN:-}"
            write_kv GOANIMES_GOAI_ADMIN_API_KEY "${GOANIMES_GOAI_ADMIN_API_KEY:-}"
            write_kv GOANIMES_GOAI_AUDIT_ENABLED "${GOANIMES_GOAI_AUDIT_ENABLED:-}"
            write_kv GOANIMES_GOAI_AUDIT_INTERVAL "${GOANIMES_GOAI_AUDIT_INTERVAL:-}"
            write_kv GOANIMES_GOAI_HTTP_TIMEOUT "${GOANIMES_GOAI_HTTP_TIMEOUT:-}"
            write_kv GOANIMES_GOAI_BASE_URL "${GOANIMES_GOAI_BASE_URL:-}"
            write_kv GOANIMES_SYNC_INTERVAL "${GOANIMES_SYNC_INTERVAL:-}"
            write_kv GOANIMES_SYNC_RUN_TIMEOUT "${GOANIMES_SYNC_RUN_TIMEOUT:-}"
            write_kv GOANIMES_RSS_POLL_INTERVAL "${GOANIMES_RSS_POLL_INTERVAL:-}"
            write_kv GOANIMES_HTTP_TIMEOUT "${GOANIMES_HTTP_TIMEOUT:-}"
            write_kv GOANIMES_CINEMETA_BASE_URL "${GOANIMES_CINEMETA_BASE_URL:-}"
            write_kv GOANIMES_CINEMETA_MIN_DELAY "${GOANIMES_CINEMETA_MIN_DELAY:-}"
            write_kv GOANIMES_CINEMETA_DISABLED "${GOANIMES_CINEMETA_DISABLED:-}"
            write_kv GOANIMES_ERAI_MAX_PER_ANIME_FEEDS "${GOANIMES_ERAI_MAX_PER_ANIME_FEEDS:-}"
            write_kv GOANIMES_ERAI_PER_ANIME_DELAY "${GOANIMES_ERAI_PER_ANIME_DELAY:-}"
            write_kv GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS "${GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS:-}"
            write_kv GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF "${GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF:-}"
            write_kv GOANIMES_ANILIST_DISABLED "${GOANIMES_ANILIST_DISABLED:-}"
            write_kv GOANIMES_JIKAN_DISABLED "${GOANIMES_JIKAN_DISABLED:-}"
            write_kv GOANIMES_KITSU_DISABLED "${GOANIMES_KITSU_DISABLED:-}"
            write_kv GOANIMES_TMDB_DISABLED "${GOANIMES_TMDB_DISABLED:-}"
            write_kv GOANIMES_TVDB_DISABLED "${GOANIMES_TVDB_DISABLED:-}"
            write_kv GOANIMES_ANILIST_MIN_DELAY "${GOANIMES_ANILIST_MIN_DELAY:-}"
            write_kv GOANIMES_JIKAN_MIN_DELAY "${GOANIMES_JIKAN_MIN_DELAY:-}"
            write_kv GOANIMES_KITSU_MIN_DELAY "${GOANIMES_KITSU_MIN_DELAY:-}"
            write_kv GOANIMES_TMDB_MIN_DELAY "${GOANIMES_TMDB_MIN_DELAY:-}"
            write_kv GOANIMES_TVDB_MIN_DELAY "${GOANIMES_TVDB_MIN_DELAY:-}"
            write_kv GOANIMES_ANIDB_CLIENT "${GOANIMES_ANIDB_CLIENT:-}"
            write_kv GOANIMES_ANIDB_CLIENTVER "${GOANIMES_ANIDB_CLIENTVER:-}"
            write_kv GOANIMES_ANIDB_MIN_DELAY "${GOANIMES_ANIDB_MIN_DELAY:-}"
            write_kv GOANIMES_ANIDB_DISABLED "${GOANIMES_ANIDB_DISABLED:-}"
            write_kv GOANIMES_MAX_BODY_BYTES "${GOANIMES_MAX_BODY_BYTES:-}"
            write_kv GOANIMES_USER_AGENT "${GOANIMES_USER_AGENT:-}"
            write_kv GOANIMES_SYNC_STATUS_TZ "${GOANIMES_SYNC_STATUS_TZ:-}"
            write_kv PORT "${PORT:-}"
            write_kv GOANIMES_ADDR "${GOANIMES_ADDR:-}"
            write_kv GOANIMES_DATA_DIR "${GOANIMES_DATA_DIR:-}"
            write_kv GIN_MODE "${GIN_MODE:-}"
            write_kv OTEL_SERVICE_NAME "${OTEL_SERVICE_NAME:-}"
            write_kv OTEL_SDK_DISABLED "${OTEL_SDK_DISABLED:-}"
            write_kv OTEL_EXPORTER_OTLP_ENDPOINT "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
            write_kv OTEL_EXPORTER_OTLP_TRACES_ENDPOINT "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}"
            if [ -n "${GOANIMES_ENV_B64:-}" ]; then
              printf '%s' "${GOANIMES_ENV_B64}" | base64 -d >> "${DEPLOY_ENV}" || { echo "GOANIMES_ENV_B64: base64 decode failed" >&2; exit 1; }
              printf '\n' >> "${DEPLOY_ENV}"
            fi
            chmod 600 "${DEPLOY_ENV}" || true
            kubectl apply -f "${K8S_DIR}/namespace.yaml"
            kubectl -n goanimes create secret generic goanimes-env \
              --from-env-file="${DEPLOY_ENV}" \
              --dry-run=client -o yaml | kubectl apply -f -
            kubectl apply -k "${K8S_DIR}"
            CONFIG_HASH=$(sha256sum "${DEPLOY_ENV}" | awk '{print $1}')
            kubectl -n goanimes patch deployment goanimes --type strategic -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"goanimes.github/config-sha\":\"${CONFIG_HASH}\"}}}}}"
            kubectl -n goanimes rollout status deployment/goanimes --timeout=360s
            echo "OK: k3s — Deployment goanimes (namespace goanimes). Ficheiro local ${DEPLOY_ENV}. Imagem ghcr.io/${GOANIMES_GHCR_OWNER}/goanimes:${GOANIMES_IMAGE_TAG:-main} + digest do commit no manifest enviado pelo CI."

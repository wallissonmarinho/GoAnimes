# Deploy na VM Oracle (**k3s**): push em main/master — build/push GHCR + SSH aplica **Pod** (Deployment)
# no cluster k3s (`namespace/goanimes`), Secret `goanimes-env` a partir de `deploy/oracle/.env.goanimes.deploy`, e
# `kubectl rollout status`. **OCI_VM_HOST** = máquina onde o **k3s** expõe `kubectl` (ex.: Ampere como server).
#
# Job deploy: environment **prd** — **Variables** (`vars.*`) → ficheiro `.env` na VM + Secret no k3s `goanimes-env`.
#   Chaves API e `GOANIMES_ENV_B64` ficam **visíveis na UI** GitHub a quem gere o ambiente
#   **prd** (útil para não esquecer valores); evita Secrets de ambiente para essa config.
#
# Infra SSH: **Secret** obrigatório `OCI_SSH_PRIVATE_KEY`. **Host/user** podem ser **Variables**
#   `OCI_VM_HOST`, `OCI_VM_USER` (repo ou ambiente **prd**), com fallback para os mesmos nomes em **Secrets**
#   (migração). `GITHUB_TOKEN` no build da imagem.
#
# Opcional: Variable `OCI_DEPLOY_ROOT` (fallback Secret legado).
#
# Na VM: o user SSH precisa de **kubeconfig do k3s** (senão kubectl fala com `localhost:8080` e falha OpenAPI).
#   Típico: `export KUBECONFIG=/etc/rancher/k3s/k3s.yaml` no `.profile` (ficheiro legível pelo user) ou cópia em `~/.kube/config`.
#
# Environment **prd** ou repo **Variables** (`vars.` — ver README):
#   GOANIMES_ADMIN_API_KEY, ADMIN_API_KEY, GOANIMES_MONGO_URI, GOANIMES_MONGO_DB,
#   GOANIMES_TMDB_API_KEY, GOANIMES_ENV_B64, OCI_DEPLOY_ROOT, OCI_VM_HOST, OCI_VM_USER (SSH; podem ser repo Variables),
#   GOANIMES_HTTP_TIMEOUT, PORT, GOANIMES_ADDR, GIN_MODE,
#   OTEL_SERVICE_NAME, OTEL_SDK_DISABLED, OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
#
# ACME / Caddy continuam no .env na VM (não são enviados por este workflow).
name: oracle-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-goanimes-${{ github.ref }}
  cancel-in-progress: true

env:
  GOANIMES_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check layout (no RSS sync dupes in services/)
        run: bash scripts/check-layout.sh

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11

      - name: Test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Ampere (k3s) é **arm64**; o runner Actions é **amd64**. Sem arm64 no manifest → ImagePullBackOff "no match for platform".
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goanimes:${{ env.GOANIMES_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goanimes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Stamp container image in k3s manifest (Deployment)
        run: |
          set -euo pipefail
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${OWNER}/goanimes:${{ github.sha }}"
          sed -i "s|__GOANIMES_CONTAINER_IMAGE__|${IMG}|g" deploy/k8s/goanimes/deployment.yaml

      # Tar no workspace (caminho relativo): appleboy/scp-action usa paths relativos a $GITHUB_WORKSPACE;
      # `source: /tmp/...` resulta em "tar: empty archive" no runner.
      - name: Pack k8s manifests
        run: |
          set -euo pipefail
          test -d deploy/k8s/goanimes
          tar czf goanimes-k8s.tgz -C deploy/k8s goanimes
          ls -la goanimes-k8s.tgz

      - name: Copy k8s bundle to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.OCI_VM_HOST || secrets.OCI_VM_HOST }}
          username: ${{ vars.OCI_VM_USER || secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          source: goanimes-k8s.tgz
          target: /tmp/

      - name: Deploy GoAnimes on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          OCI_DEPLOY_ROOT: ${{ vars.OCI_DEPLOY_ROOT || secrets.OCI_DEPLOY_ROOT }}
          GOANIMES_GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GOANIMES_IMAGE_TAG: main
          GOANIMES_ADMIN_API_KEY: ${{ vars.GOANIMES_ADMIN_API_KEY }}
          ADMIN_API_KEY: ${{ vars.ADMIN_API_KEY }}
          GOANIMES_MONGO_URI: ${{ vars.GOANIMES_MONGO_URI }}
          GOANIMES_MONGO_DB: ${{ vars.GOANIMES_MONGO_DB }}
          GOANIMES_TMDB_API_KEY: ${{ vars.GOANIMES_TMDB_API_KEY }}
          GOANIMES_ENV_B64: ${{ vars.GOANIMES_ENV_B64 }}
          GOANIMES_HTTP_TIMEOUT: ${{ vars.GOANIMES_HTTP_TIMEOUT }}
          PORT: ${{ vars.PORT }}
          GOANIMES_ADDR: ${{ vars.GOANIMES_ADDR }}
          GIN_MODE: ${{ vars.GIN_MODE }}
          OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
          OTEL_SDK_DISABLED: ${{ vars.OTEL_SDK_DISABLED }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT }}
        with:
          host: ${{ vars.OCI_VM_HOST || secrets.OCI_VM_HOST }}
          username: ${{ vars.OCI_VM_USER || secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: OCI_DEPLOY_ROOT,GOANIMES_GHCR_OWNER,GOANIMES_IMAGE_TAG,GOANIMES_ADMIN_API_KEY,ADMIN_API_KEY,GOANIMES_MONGO_URI,GOANIMES_MONGO_DB,GOANIMES_TMDB_API_KEY,GOANIMES_ENV_B64,GOANIMES_HTTP_TIMEOUT,PORT,GOANIMES_ADDR,GIN_MODE,OTEL_SERVICE_NAME,OTEL_SDK_DISABLED,OTEL_EXPORTER_OTLP_ENDPOINT,OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            export GOANIMES_GHCR_OWNER="${GOANIMES_GHCR_OWNER}"
            export GOANIMES_IMAGE_TAG="${GOANIMES_IMAGE_TAG:-main}"
            ORACLE_DIR="${ROOT}/deploy/oracle"
            DEPLOY_ENV="${ORACLE_DIR}/.env.goanimes.deploy"
            mkdir -p "${ORACLE_DIR}"
            K8S_TAR="${GOANIMES_K8S_TARBALL:-/tmp/goanimes-k8s.tgz}"
            if [ ! -f "${K8S_TAR}" ]; then
              echo "Falta ${K8S_TAR} (passo SCP do workflow). Sem tarball não há manifests para kubectl." >&2
              exit 1
            fi
            mkdir -p "${ROOT}/deploy/k8s"
            tar xzf "${K8S_TAR}" -C "${ROOT}/deploy/k8s"
            rm -f "${K8S_TAR}"
            K8S_DIR="${ROOT}/deploy/k8s/goanimes"
            command -v kubectl >/dev/null 2>&1 || { echo "kubectl não está no PATH nesta VM (precisas do kubeconfig do k3s)." >&2; exit 1; }
            if [ -z "${KUBECONFIG:-}" ]; then
              for f in /etc/rancher/k3s/k3s.yaml "${HOME}/.kube/config"; do
                if [ -r "$f" ]; then
                  export KUBECONFIG="$f"
                  break
                fi
              done
            fi
            if [ -z "${KUBECONFIG:-}" ] || ! kubectl cluster-info --request-timeout=10s >/dev/null 2>&1; then
              echo "kubectl sem API do k3s (KUBECONFIG vazio ou inválido → default localhost:8080 / OpenAPI falha)." >&2
              echo "Na VM: sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config && sudo chown ubuntu:ubuntu ~/.kube/config  # ajusta user:grupo ao teu login SSH" >&2
              echo "Ou: export KUBECONFIG=/etc/rancher/k3s/k3s.yaml no .profile se esse ficheiro for legível pelo user de deploy." >&2
              exit 1
            fi
            umask 077
            : > "${DEPLOY_ENV}"
            write_kv() {
              _k="$1"
              _v="$2"
              [ -n "${_v}" ] || return 0
              printf '%s=%s\n' "${_k}" "${_v}" >> "${DEPLOY_ENV}"
            }
            write_kv GOANIMES_ADMIN_API_KEY "${GOANIMES_ADMIN_API_KEY:-}"
            write_kv ADMIN_API_KEY "${ADMIN_API_KEY:-}"
            write_kv GOANIMES_MONGO_URI "${GOANIMES_MONGO_URI:-}"
            write_kv GOANIMES_MONGO_DB "${GOANIMES_MONGO_DB:-}"
            write_kv GOANIMES_TMDB_API_KEY "${GOANIMES_TMDB_API_KEY:-}"
            write_kv GOANIMES_HTTP_TIMEOUT "${GOANIMES_HTTP_TIMEOUT:-}"
            write_kv PORT "${PORT:-}"
            write_kv GOANIMES_ADDR "${GOANIMES_ADDR:-}"
            write_kv GIN_MODE "${GIN_MODE:-}"
            write_kv OTEL_SERVICE_NAME "${OTEL_SERVICE_NAME:-}"
            write_kv OTEL_SDK_DISABLED "${OTEL_SDK_DISABLED:-}"
            write_kv OTEL_EXPORTER_OTLP_ENDPOINT "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
            write_kv OTEL_EXPORTER_OTLP_TRACES_ENDPOINT "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}"
            if [ -n "${GOANIMES_ENV_B64:-}" ]; then
              printf '%s' "${GOANIMES_ENV_B64}" | base64 -d >> "${DEPLOY_ENV}" || { echo "GOANIMES_ENV_B64: base64 decode failed" >&2; exit 1; }
              printf '\n' >> "${DEPLOY_ENV}"
            fi
            chmod 600 "${DEPLOY_ENV}" || true
            kubectl apply -f "${K8S_DIR}/namespace.yaml"
            kubectl -n goanimes create secret generic goanimes-env \
              --from-env-file="${DEPLOY_ENV}" \
              --dry-run=client -o yaml | kubectl apply -f -
            kubectl apply -k "${K8S_DIR}"
            CONFIG_HASH=$(sha256sum "${DEPLOY_ENV}" | awk '{print $1}')
            kubectl -n goanimes patch deployment goanimes --type strategic -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"goanimes.github/config-sha\":\"${CONFIG_HASH}\"}}}}}"
            # E2.Micro: o pod antigo pode demorar a sair de Terminating (CPU/CNI); 360s falhou em rollouts lentos.
            kubectl -n goanimes rollout status deployment/goanimes --timeout=900s
            echo "OK: k3s — Deployment goanimes (namespace goanimes). Ficheiro local ${DEPLOY_ENV}. Imagem ghcr.io/${GOANIMES_GHCR_OWNER}/goanimes:${GOANIMES_IMAGE_TAG:-main} + digest do commit no manifest enviado pelo CI."

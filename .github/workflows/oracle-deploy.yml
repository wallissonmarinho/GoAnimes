# Deploy na VM Oracle (Docker Compose) após push na branch principal.
#
# Job deploy: environment: prd → tudo o que definires em Secrets/Variables do ambiente **prd**
# (e Repository secrets OCI/GHCR) é passado por SSH e gravado em deploy/oracle/.env.goanimes.deploy
# na VM — não precisas de editar à mão na Oracle para estas chaves.
#
# Repository secrets: OCI_VM_HOST, OCI_VM_USER, OCI_SSH_PRIVATE_KEY; opcional OCI_DEPLOY_ROOT, GHCR_*
#
# Environment **prd** — Secrets (sensível): GOANIMES_ADMIN_API_KEY, ADMIN_API_KEY, DATABASE_URL,
#   GOANIMES_SQLITE_DSN, GOANIMES_TMDB_API_KEY, GOANIMES_TVDB_API_KEY, GOANIMES_TVDB_PIN (opcional), GOANIMES_ENV_B64 (opcional: .env extra em base64, ver README)
#
# Environment **prd** — Variables (tuning):
#   GOANIMES_SYNC_INTERVAL, GOANIMES_RSS_POLL_INTERVAL, GOANIMES_HTTP_TIMEOUT, GOANIMES_ERAI_MAX_PER_ANIME_FEEDS,
#   GOANIMES_ERAI_PER_ANIME_DELAY, GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS, GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF,
#   GOANIMES_ANILIST_DISABLED, GOANIMES_JIKAN_DISABLED, GOANIMES_KITSU_DISABLED, GOANIMES_TMDB_DISABLED, GOANIMES_TVDB_DISABLED,
#   GOANIMES_ANILIST_MIN_DELAY, GOANIMES_JIKAN_MIN_DELAY, GOANIMES_KITSU_MIN_DELAY, GOANIMES_TMDB_MIN_DELAY, GOANIMES_TVDB_MIN_DELAY,
#   GOANIMES_TMDB_API_KEY (também em Secret prd; ou só em GOANIMES_ENV_B64),
#   GOANIMES_ANIDB_CLIENT, GOANIMES_ANIDB_CLIENTVER, GOANIMES_ANIDB_MIN_DELAY, GOANIMES_ANIDB_DISABLED,
#   GOANIMES_MAX_BODY_BYTES, GOANIMES_USER_AGENT, GOANIMES_SYNC_STATUS_TZ, PORT, GOANIMES_ADDR, GOANIMES_DATA_DIR, GIN_MODE,
#   OTEL_SERVICE_NAME, OTEL_SDK_DISABLED, OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
#
# ACME / Caddy continuam no .env na VM (não são enviados por este workflow).
name: oracle-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-goanimes-${{ github.ref }}
  cancel-in-progress: true

env:
  GOANIMES_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check layout (no RSS sync dupes in services/)
        run: bash scripts/check-layout.sh

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11

      - name: Test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goanimes:${{ env.GOANIMES_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goanimes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: GHCR owner for VM compose
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy GoAnimes on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          OCI_DEPLOY_ROOT: ${{ secrets.OCI_DEPLOY_ROOT }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GOANIMES_GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GOANIMES_IMAGE_TAG: main
          GOANIMES_ADMIN_API_KEY: ${{ secrets.GOANIMES_ADMIN_API_KEY }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOANIMES_SQLITE_DSN: ${{ secrets.GOANIMES_SQLITE_DSN }}
          GOANIMES_TMDB_API_KEY: ${{ secrets.GOANIMES_TMDB_API_KEY }}
          GOANIMES_TVDB_API_KEY: ${{ secrets.GOANIMES_TVDB_API_KEY }}
          GOANIMES_TVDB_PIN: ${{ secrets.GOANIMES_TVDB_PIN }}
          GOANIMES_ENV_B64: ${{ secrets.GOANIMES_ENV_B64 }}
          GOANIMES_SYNC_INTERVAL: ${{ vars.GOANIMES_SYNC_INTERVAL }}
          GOANIMES_RSS_POLL_INTERVAL: ${{ vars.GOANIMES_RSS_POLL_INTERVAL }}
          GOANIMES_HTTP_TIMEOUT: ${{ vars.GOANIMES_HTTP_TIMEOUT }}
          GOANIMES_ERAI_MAX_PER_ANIME_FEEDS: ${{ vars.GOANIMES_ERAI_MAX_PER_ANIME_FEEDS }}
          GOANIMES_ERAI_PER_ANIME_DELAY: ${{ vars.GOANIMES_ERAI_PER_ANIME_DELAY }}
          GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS: ${{ vars.GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS }}
          GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF: ${{ vars.GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF }}
          GOANIMES_ANILIST_DISABLED: ${{ vars.GOANIMES_ANILIST_DISABLED }}
          GOANIMES_JIKAN_DISABLED: ${{ vars.GOANIMES_JIKAN_DISABLED }}
          GOANIMES_KITSU_DISABLED: ${{ vars.GOANIMES_KITSU_DISABLED }}
          GOANIMES_TMDB_DISABLED: ${{ vars.GOANIMES_TMDB_DISABLED }}
          GOANIMES_TVDB_DISABLED: ${{ vars.GOANIMES_TVDB_DISABLED }}
          GOANIMES_ANILIST_MIN_DELAY: ${{ vars.GOANIMES_ANILIST_MIN_DELAY }}
          GOANIMES_JIKAN_MIN_DELAY: ${{ vars.GOANIMES_JIKAN_MIN_DELAY }}
          GOANIMES_KITSU_MIN_DELAY: ${{ vars.GOANIMES_KITSU_MIN_DELAY }}
          GOANIMES_TMDB_MIN_DELAY: ${{ vars.GOANIMES_TMDB_MIN_DELAY }}
          GOANIMES_TVDB_MIN_DELAY: ${{ vars.GOANIMES_TVDB_MIN_DELAY }}
          GOANIMES_ANIDB_CLIENT: ${{ vars.GOANIMES_ANIDB_CLIENT }}
          GOANIMES_ANIDB_CLIENTVER: ${{ vars.GOANIMES_ANIDB_CLIENTVER }}
          GOANIMES_ANIDB_MIN_DELAY: ${{ vars.GOANIMES_ANIDB_MIN_DELAY }}
          GOANIMES_ANIDB_DISABLED: ${{ vars.GOANIMES_ANIDB_DISABLED }}
          GOANIMES_MAX_BODY_BYTES: ${{ vars.GOANIMES_MAX_BODY_BYTES }}
          GOANIMES_USER_AGENT: ${{ vars.GOANIMES_USER_AGENT }}
          GOANIMES_SYNC_STATUS_TZ: ${{ vars.GOANIMES_SYNC_STATUS_TZ }}
          PORT: ${{ vars.PORT }}
          GOANIMES_ADDR: ${{ vars.GOANIMES_ADDR }}
          GOANIMES_DATA_DIR: ${{ vars.GOANIMES_DATA_DIR }}
          GIN_MODE: ${{ vars.GIN_MODE }}
          OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
          OTEL_SDK_DISABLED: ${{ vars.OTEL_SDK_DISABLED }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: OCI_DEPLOY_ROOT,GHCR_PULL_TOKEN,GHCR_USER,GOANIMES_GHCR_OWNER,GOANIMES_IMAGE_TAG,GOANIMES_ADMIN_API_KEY,ADMIN_API_KEY,DATABASE_URL,GOANIMES_SQLITE_DSN,GOANIMES_TMDB_API_KEY,GOANIMES_TVDB_API_KEY,GOANIMES_TVDB_PIN,GOANIMES_ENV_B64,GOANIMES_SYNC_INTERVAL,GOANIMES_RSS_POLL_INTERVAL,GOANIMES_HTTP_TIMEOUT,GOANIMES_ERAI_MAX_PER_ANIME_FEEDS,GOANIMES_ERAI_PER_ANIME_DELAY,GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS,GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF,GOANIMES_ANILIST_DISABLED,GOANIMES_JIKAN_DISABLED,GOANIMES_KITSU_DISABLED,GOANIMES_TMDB_DISABLED,GOANIMES_TVDB_DISABLED,GOANIMES_ANILIST_MIN_DELAY,GOANIMES_JIKAN_MIN_DELAY,GOANIMES_KITSU_MIN_DELAY,GOANIMES_TMDB_MIN_DELAY,GOANIMES_TVDB_MIN_DELAY,GOANIMES_ANIDB_CLIENT,GOANIMES_ANIDB_CLIENTVER,GOANIMES_ANIDB_MIN_DELAY,GOANIMES_ANIDB_DISABLED,GOANIMES_MAX_BODY_BYTES,GOANIMES_USER_AGENT,GOANIMES_SYNC_STATUS_TZ,PORT,GOANIMES_ADDR,GOANIMES_DATA_DIR,GIN_MODE,OTEL_SERVICE_NAME,OTEL_SDK_DISABLED,OTEL_EXPORTER_OTLP_ENDPOINT,OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            export GOANIMES_GHCR_OWNER="${GOANIMES_GHCR_OWNER}"
            export GOANIMES_IMAGE_TAG="${GOANIMES_IMAGE_TAG:-main}"
            ORACLE_DIR="${ROOT}/deploy/oracle"
            DEPLOY_ENV="${ORACLE_DIR}/.env.goanimes.deploy"
            umask 077
            : > "${DEPLOY_ENV}"
            write_kv() {
              _k="$1"
              _v="$2"
              [ -n "${_v}" ] || return 0
              printf '%s=%s\n' "${_k}" "${_v}" >> "${DEPLOY_ENV}"
            }
            write_kv GOANIMES_ADMIN_API_KEY "${GOANIMES_ADMIN_API_KEY:-}"
            write_kv ADMIN_API_KEY "${ADMIN_API_KEY:-}"
            write_kv DATABASE_URL "${DATABASE_URL:-}"
            write_kv GOANIMES_SQLITE_DSN "${GOANIMES_SQLITE_DSN:-}"
            write_kv GOANIMES_TMDB_API_KEY "${GOANIMES_TMDB_API_KEY:-}"
            write_kv GOANIMES_TVDB_API_KEY "${GOANIMES_TVDB_API_KEY:-}"
            write_kv GOANIMES_TVDB_PIN "${GOANIMES_TVDB_PIN:-}"
            write_kv GOANIMES_SYNC_INTERVAL "${GOANIMES_SYNC_INTERVAL:-}"
            write_kv GOANIMES_RSS_POLL_INTERVAL "${GOANIMES_RSS_POLL_INTERVAL:-}"
            write_kv GOANIMES_HTTP_TIMEOUT "${GOANIMES_HTTP_TIMEOUT:-}"
            write_kv GOANIMES_ERAI_MAX_PER_ANIME_FEEDS "${GOANIMES_ERAI_MAX_PER_ANIME_FEEDS:-}"
            write_kv GOANIMES_ERAI_PER_ANIME_DELAY "${GOANIMES_ERAI_PER_ANIME_DELAY:-}"
            write_kv GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS "${GOANIMES_ERAI_PER_ANIME_MAX_ATTEMPTS:-}"
            write_kv GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF "${GOANIMES_ERAI_PER_ANIME_RETRY_BACKOFF:-}"
            write_kv GOANIMES_ANILIST_DISABLED "${GOANIMES_ANILIST_DISABLED:-}"
            write_kv GOANIMES_JIKAN_DISABLED "${GOANIMES_JIKAN_DISABLED:-}"
            write_kv GOANIMES_KITSU_DISABLED "${GOANIMES_KITSU_DISABLED:-}"
            write_kv GOANIMES_TMDB_DISABLED "${GOANIMES_TMDB_DISABLED:-}"
            write_kv GOANIMES_TVDB_DISABLED "${GOANIMES_TVDB_DISABLED:-}"
            write_kv GOANIMES_ANILIST_MIN_DELAY "${GOANIMES_ANILIST_MIN_DELAY:-}"
            write_kv GOANIMES_JIKAN_MIN_DELAY "${GOANIMES_JIKAN_MIN_DELAY:-}"
            write_kv GOANIMES_KITSU_MIN_DELAY "${GOANIMES_KITSU_MIN_DELAY:-}"
            write_kv GOANIMES_TMDB_MIN_DELAY "${GOANIMES_TMDB_MIN_DELAY:-}"
            write_kv GOANIMES_TVDB_MIN_DELAY "${GOANIMES_TVDB_MIN_DELAY:-}"
            write_kv GOANIMES_ANIDB_CLIENT "${GOANIMES_ANIDB_CLIENT:-}"
            write_kv GOANIMES_ANIDB_CLIENTVER "${GOANIMES_ANIDB_CLIENTVER:-}"
            write_kv GOANIMES_ANIDB_MIN_DELAY "${GOANIMES_ANIDB_MIN_DELAY:-}"
            write_kv GOANIMES_ANIDB_DISABLED "${GOANIMES_ANIDB_DISABLED:-}"
            write_kv GOANIMES_MAX_BODY_BYTES "${GOANIMES_MAX_BODY_BYTES:-}"
            write_kv GOANIMES_USER_AGENT "${GOANIMES_USER_AGENT:-}"
            write_kv GOANIMES_SYNC_STATUS_TZ "${GOANIMES_SYNC_STATUS_TZ:-}"
            write_kv PORT "${PORT:-}"
            write_kv GOANIMES_ADDR "${GOANIMES_ADDR:-}"
            write_kv GOANIMES_DATA_DIR "${GOANIMES_DATA_DIR:-}"
            write_kv GIN_MODE "${GIN_MODE:-}"
            write_kv OTEL_SERVICE_NAME "${OTEL_SERVICE_NAME:-}"
            write_kv OTEL_SDK_DISABLED "${OTEL_SDK_DISABLED:-}"
            write_kv OTEL_EXPORTER_OTLP_ENDPOINT "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
            write_kv OTEL_EXPORTER_OTLP_TRACES_ENDPOINT "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}"
            if [ -n "${GOANIMES_ENV_B64:-}" ]; then
              printf '%s' "${GOANIMES_ENV_B64}" | base64 -d >> "${DEPLOY_ENV}" || { echo "GOANIMES_ENV_B64: base64 decode failed" >&2; exit 1; }
              printf '\n' >> "${DEPLOY_ENV}"
            fi
            chmod 600 "${DEPLOY_ENV}" || true
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "${GHCR_USER:-${GOANIMES_GHCR_OWNER}}" --password-stdin
            fi
            cd "${ORACLE_DIR}"
            docker compose -f docker-compose.goanimes.yml pull goanimes
            # Recria o contentor para aplicar .env.goanimes.deploy (Compose nem sempre recria só com env alterado).
            docker compose -f docker-compose.goanimes.yml up -d --force-recreate goanimes

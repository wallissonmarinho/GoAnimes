# Deploy na VM Oracle (Docker Compose) após push na branch principal.
# Build da imagem roda no GitHub Actions; na VM só docker pull + up (leve para Micro).
#
# Na VM: ${ROOT}/GoAnimes, ${ROOT}/deploy/oracle — ver deploy/oracle/README.md
# Compose na VM GoAnimes: docker-compose.goanimes.yml
#
# Secrets (Settings → Secrets → Actions):
#   OCI_VM_HOST, OCI_VM_USER, OCI_SSH_PRIVATE_KEY
#   OCI_DEPLOY_ROOT — opcional; default /opt/go (ex.: /home/ubuntu/www)
#
# Imagem: ghcr.io/<owner>/goanimes:main (pública no GHCR ou use login abaixo)
# Opcional (pacote GHCR privado):
#   GHCR_PULL_TOKEN — PAT com read:packages
#   GHCR_USER       — usuário GitHub (ex.: wallissonmarinho)
name: oracle-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-goanimes-${{ github.ref }}
  cancel-in-progress: true

env:
  GOANIMES_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goanimes:${{ env.GOANIMES_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/goanimes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: GHCR owner for VM compose
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy GoAnimes on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          OCI_DEPLOY_ROOT: ${{ secrets.OCI_DEPLOY_ROOT }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GOANIMES_GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GOANIMES_IMAGE_TAG: main
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: OCI_DEPLOY_ROOT,GHCR_PULL_TOKEN,GHCR_USER,GOANIMES_GHCR_OWNER,GOANIMES_IMAGE_TAG
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            export GOANIMES_GHCR_OWNER="${GOANIMES_GHCR_OWNER}"
            export GOANIMES_IMAGE_TAG="${GOANIMES_IMAGE_TAG:-main}"
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "${GHCR_USER:-${GOANIMES_GHCR_OWNER}}" --password-stdin
            fi
            cd "${ROOT}/deploy/oracle"
            docker compose -f docker-compose.goanimes.yml pull goanimes
            docker compose -f docker-compose.goanimes.yml up -d goanimes

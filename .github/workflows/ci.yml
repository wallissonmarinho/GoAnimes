# CI em branches de trabalho e PRs. Push em main/master NÃO dispara isto — o fly-deploy já corre test+deploy.
name: ci

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -trimpath -o /tmp/goanimes ./cmd/goanimes

# CI em branches de trabalho e PRs. Push em main/master NÃO dispara isto — o oracle-deploy já corre test+deploy.
name: ci

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # v6+ runs on Node 24 (avoids Node 20 runner deprecation warnings).
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # Prevents intermittent "tar ... exit code 2" on cache restore (toolchain/module cache conflicts).
          cache: false

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -trimpath -o /tmp/goanimes ./cmd/goanimes
